name: Indent

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Run clang-format via pre-commit
      run: |
        python -m pip install --disable-pip-version-check --upgrade pre-commit
        mapfile -d '' files < <(git ls-files -z -- '*.h' '*.cc')
        status=0
        pre-commit run clang-format --show-diff-on-failure --files "${files[@]}" || status=$?
        git diff
        git diff-files --quiet || exit $?
        exit $status
